name: Official export dependencies

on:
  workflow_dispatch:

jobs:
  official-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install export dependencies
        run: python3 -m pip install -e ".[export]"
      - name: Run official dependency export tests
        run: RUN_OFFICIAL_EXPORT_TESTS=1 python3 -m pytest apps/api/tests/test_official_export_dependencies.py -q
