name: Artifact publish smoke

on:
  workflow_dispatch:

jobs:
  artifact-publish-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python3 -m pip install -e ".[dev]"
      - name: Run artifact publish smoke tests
        run: |
          python3 -m pytest \
            apps/api/tests/test_keyframe_extractor.py::KeyframeExtractorTest::test_publish_keyframe_artifacts_copies_images_and_records_uri \
            apps/api/tests/test_episode_preview_service.py::EpisodePreviewServiceTest::test_preview_cache_can_publish_generated_preview \
            apps/api/tests/test_rerun_service.py::RerunSessionStoreTest::test_create_publishes_ready_recording_when_publish_uri_is_set \
            apps/api/tests/test_export_service.py::ExportServiceTest::test_export_can_publish_artifacts_to_fsspec_destination \
            -q
