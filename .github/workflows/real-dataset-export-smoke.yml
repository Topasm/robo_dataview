name: Real dataset export smoke

on:
  workflow_dispatch:
    inputs:
      dataset_uri:
        description: "Lance dataset URI to open"
        required: true
        default: "hf://datasets/lance-format/lerobot-xvla-soft-fold/data"
      episode_limit:
        description: "Number of leading episodes to export"
        required: true
        default: "1"
      export_videos:
        description: "Also materialize available MP4 video blobs"
        required: true
        type: boolean
        default: false

jobs:
  real-dataset-export-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Lance and export dependencies
        run: python3 -m pip install -e ".[lance,export,video,dev]"
      - name: Run real dataset export smoke test
        env:
          RUN_REAL_DATASET_EXPORT_SMOKE: "1"
          REAL_DATASET_URI: ${{ inputs.dataset_uri }}
          REAL_DATASET_EPISODE_LIMIT: ${{ inputs.episode_limit }}
          REAL_DATASET_EXPORT_VIDEOS: ${{ inputs.export_videos }}
        run: python3 -m pytest apps/api/tests/test_real_dataset_export_smoke.py -q
