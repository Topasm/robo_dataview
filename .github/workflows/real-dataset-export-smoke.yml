name: Real dataset export smoke

on:
  workflow_dispatch:
    inputs:
      dataset_uri:
        description: "Lance dataset URI to open"
        required: true
        default: "hf://datasets/lance-format/lerobot-xvla-soft-fold/data"
      episode_limit:
        description: "Number of episodes to export from the selected offset"
        required: true
        default: "1"
      episode_offset:
        description: "Episode list offset to start from"
        required: true
        default: "0"
      export_videos:
        description: "Also materialize available MP4 video blobs"
        required: true
        type: boolean
        default: false
      require_videos:
        description: "Fail instead of skip when video materialization cannot run"
        required: true
        type: boolean
        default: false
      require_all_cameras:
        description: "Fail if any selected episode camera cannot be materialized"
        required: true
        type: boolean
        default: false

jobs:
  real-dataset-export-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Lance, storage, and export dependencies
        run: python3 -m pip install -e ".[lance,export,video,storage,dev]"
      - name: Run real dataset export smoke test
        env:
          RUN_REAL_DATASET_EXPORT_SMOKE: "1"
          REAL_DATASET_URI: ${{ inputs.dataset_uri }}
          REAL_DATASET_EPISODE_LIMIT: ${{ inputs.episode_limit }}
          REAL_DATASET_EPISODE_OFFSET: ${{ inputs.episode_offset }}
          REAL_DATASET_EXPORT_VIDEOS: ${{ inputs.export_videos }}
          REAL_DATASET_REQUIRE_VIDEOS: ${{ inputs.require_videos }}
          REAL_DATASET_REQUIRE_ALL_CAMERAS: ${{ inputs.require_all_cameras }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 -m pytest apps/api/tests/test_real_dataset_export_smoke.py -q
